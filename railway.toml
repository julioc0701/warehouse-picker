[build]
buildCommand = "npm --prefix frontend ci && npm --prefix frontend run build && mkdir -p backend/static && cp -r frontend/dist/. backend/static/ && pip install -r backend/requirements.txt"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
